services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
    ports:
      - 4533:4533
    volumes:
      - ./configs/navidrome:/data
      - ./srv/data/media/music:/music:ro #read-only
    restart: unless-stopped
  lidarr:
    image: lscr.io/linuxserver/lidarr:nightly
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./configs/lidarr:/config
      - ./srv/data:/data
    ports:
      - 8686:8686
    restart: unless-stopped
  slskd:
    image: slskd/slskd
    container_name: slskd
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Etc/UTC
      - WEBUI_PORTS=5030/tcp,5031/tcp
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_API_KEY=${SLSKD_API_KEY}
      - SLSKD_SLSK_USERNAME=${SOULSEEK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SOULSEEK_PASSWORD}
      - SLSKD_DOWNLOADS_DIR=/data/slskd/complete
      - SLSKD_INCOMPLETE_DIR=/data/slskd/incomplete
      - SLSKD_SHARED_DIR=/data/media/music
      - UNBOUND_ENABLED=false
      - UNBOUND_NAMESERVERS
    ports:
      - 5030:5030
      - 5031:5031
    volumes:
      - ./configs/slskd:/config
      - ./srv/data:/data
    restart: unless-stopped
  explo:
    image: ghcr.io/lumepart/explo:latest
    container_name: explo
    environment:
      - TZ=UTC
      - WEB_UI=true
      - UI_USERNAME=${EXPLO_UI_USERNAME}
      - UI_PASSWORD=${EXPLO_UI_PASSWORD}
    ports:
      - 7288:7288
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/explo:/opt/explo/config
      - ./configs/explo/.env:/opt/explo/.env
      - ./srv/data/media/music/explo:/data
      - ./srv/data/slskd:/slskd
    restart: unless-stopped
  aurral-sakura:
    image: ghcr.io/lklynet/aurral:latest
    container_name: aurral-sakura
    environment:
      - DOWNLOAD_FOLDER=./srv/data/slskd/complete
    ports:
      - 3001:3001
    volumes:
      - ./configs/aurral:/app/backend/data
      - ./srv/data/slskd/complete:/app/downloads
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./configs/caddy/data:/data
      - ./configs/caddy/config:/config
    restart: unless-stopped

  music-grabber:
    image: g33kphr33k/musicgrabber:latest
    container_name: music-grabber
    restart: unless-stopped
    # Required for Spotify playlists over 100 tracks (headless browser)
    shm_size: '2gb'
    ports:
      - "38274:8080"
    volumes:
      - /path/to/your/music:/music
      - ./data:/data
    environment:
      - MUSIC_DIR= /srv/data/media//music
      - DB_PATH=/data/music_grabber.db
      # Optional: serve behind a reverse-proxy subpath (proxy must strip the prefix)
      # - ROOT_PATH=/musicgrabber
      - ENABLE_MUSICBRAINZ=true
      - DEFAULT_CONVERT_TO_FLAC=true
      # Optional: Run as specific user (like *arr stack) for correct file permissions
      - PUID=1000
      - PGID=1000
      # Optional: Custom bind address/port (useful for IPv6 or non-standard setups)
      # - LISTEN_ADDR=0.0.0.0
      # - LISTEN_PORT=8080
      # Optional: Navidrome auto-rescan
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=${NAVI_ADMIN}
      - NAVIDROME_PASS=${NAVI_PWD}
      # Optional: Jellyfin auto-rescan
      # - JELLYFIN_URL=http://jellyfin:8096
      # - JELLYFIN_API_KEY=your-jellyfin-api-key
      # Optional: Notifications
      # - NOTIFY_ON=playlists,bulk,errors
      # - TELEGRAM_WEBHOOK_URL=https://api.telegram.org/bot{token}/sendMessage?chat_id={chat_id}
      # - WEBHOOK_URL=https://your-webhook-endpoint.com/hook
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=user@example.com
      # - SMTP_PASS=password
      # - SMTP_TO=you@example.com

